<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 70">
  <defs>
    <linearGradient id="fs" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0"/>
      <stop offset="20%" stop-color="#A855F7" stop-opacity=".5"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity=".6"/>
      <stop offset="80%" stop-color="#2DD4BF" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="fw1" patternUnits="userSpaceOnUse" width="10" height="8">
      <rect x="1" y="1" width="3" height="2.5" rx=".3" fill="#A855F7" opacity=".5"/>
      <rect x="6" y="1" width="3" height="2.5" rx=".3" fill="#A855F7" opacity=".1"/>
      <rect x="1" y="5" width="3" height="2.5" rx=".3" fill="#A855F7" opacity=".25"/>
      <rect x="6" y="5" width="3" height="2.5" rx=".3" fill="#A855F7" opacity=".4"/>
    </pattern>
    <pattern id="fw2" patternUnits="userSpaceOnUse" width="10" height="8">
      <rect x="1" y="1" width="3" height="2.5" rx=".3" fill="#2DD4BF" opacity=".35"/>
      <rect x="6" y="1" width="3" height="2.5" rx=".3" fill="#2DD4BF" opacity=".55"/>
      <rect x="1" y="5" width="3" height="2.5" rx=".3" fill="#2DD4BF" opacity=".15"/>
      <rect x="6" y="5" width="3" height="2.5" rx=".3" fill="#2DD4BF" opacity=".45"/>
    </pattern>
  </defs>

  <rect width="960" height="70" fill="url(#fs)"/>

  <!-- Neon line at top -->
  <rect x="60" y="2" width="840" height="1" fill="url(#fg)" opacity=".4" rx=".5"/>

  <!-- Mini skyline silhouettes -->
  <rect x="80" y="32" width="16" height="30" fill="#060a14" stroke="#110e28" stroke-width=".3" rx=".5"/>
  <rect x="82" y="34" width="12" height="26" fill="url(#fw1)"/>

  <rect x="102" y="18" width="14" height="44" fill="#060a14" stroke="#0a1828" stroke-width=".3" rx=".5"/>
