  <rect x="744" y="38" width="16" height="24" fill="#060a14" stroke="#110e28" stroke-width=".3" rx=".5"/>
  <rect x="746" y="40" width="12" height="20" fill="url(#fw1)"/>

  <rect x="840" y="30" width="14" height="32" fill="#060a14" stroke="#110e28" stroke-width=".3" rx=".5"/>
  <rect x="842" y="32" width="10" height="28" fill="url(#fw2)"/>

  <rect x="860" y="18" width="16" height="44" fill="#060a14" stroke="#0a1828" stroke-width=".3" rx=".5"/>
  <rect x="862" y="20" width="12" height="40" fill="url(#fw1)"/>

  <!-- Ground line -->
  <line x1="60" y1="62" x2="900" y2="62" stroke="#A855F7" stroke-width=".3" opacity=".08"/>
