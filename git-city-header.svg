  <rect x="312" y="252" width="26" height="16" fill="url(#wm)" rx="1"/>

  <!-- B10 — very tall + antenna -->
  <rect x="346" y="90" width="28" height="180" fill="#060a16" stroke="#110e28" stroke-width=".5" rx="1"/>
  <rect x="348" y="92" width="24" height="176" fill="url(#wp2)" rx="1"/>
  <rect x="357" y="84" width="4" height="6" fill="#0e0820" rx=".5"/>
  <line x1="359" y1="84" x2="359" y2="66" stroke="#2DD4BF" stroke-width="1" opacity=".25"/>
  <circle cx="359" cy="64" r="2.5" fill="#2DD4BF" opacity=".5" filter="url(#gs)">
