  <!-- B4 — very tall + antenna -->
  <rect x="132" y="74" width="28" height="196" fill="#060a16" stroke="#110e28" stroke-width=".5" rx="1"/>
  <rect x="134" y="76" width="24" height="192" fill="url(#wp2)" rx="1"/>
  <rect x="143" y="68" width="4" height="6" fill="#0e0820" rx=".5"/>
  <line x1="145" y1="68" x2="145" y2="48" stroke="#A855F7" stroke-width="1" opacity=".25"/>
  <circle cx="145" cy="46" r="2.8" fill="#A855F7" opacity=".55" filter="url(#gs)">
    <animate attributeName="opacity" values=".55;.08;.55" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- B5 — medium-tall -->
  <rect x="166" y="158" width="34" height="112" fill="#060a16" stroke="#0a1828" stroke-width=".5" rx="1"/>
  <rect x="168" y="160" width="30" height="108" fill="url(#wi)" rx="1"/>

  <!-- B6 — short -->
  <rect x="206" y="220" width="26" height="50" fill="#060a16" stroke="#110e28" stroke-width=".5" rx="1"/>
  <rect x="208" y="222" width="22" height="46" fill="url(#wm)" rx="1"/>

  <!-- B7 — TALLEST + antenna (centerpiece) -->
