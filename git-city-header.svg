<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320">
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="960" height="4">
      <rect width="960" height="1" y="3" fill="#fff" opacity=".02"/>
    </pattern>
    <pattern id="wa" patternUnits="userSpaceOnUse" width="22" height="16">
      <rect x="1" y="1" width="8" height="5" fill="#b8ff57" opacity=".85"/>
      <rect x="12" y="1" width="8" height="5" fill="#b8ff57" opacity=".15"/>
      <rect x="1" y="9" width="8" height="5" fill="#b8ff57" opacity=".35"/>
      <rect x="12" y="9" width="8" height="5" fill="#b8ff57" opacity=".7"/>
    </pattern>
    <pattern id="wb" patternUnits="userSpaceOnUse" width="22" height="16">
      <rect x="1" y="1" width="8" height="5" fill="#b8ff57" opacity=".2"/>
      <rect x="12" y="1" width="8" height="5" fill="#b8ff57" opacity=".9"/>
      <rect x="1" y="9" width="8" height="5" fill="#b8ff57" opacity=".55"/>
      <rect x="12" y="9" width="8" height="5" fill="#b8ff57" opacity=".25"/>
    </pattern>
    <pattern id="wc" patternUnits="userSpaceOnUse" width="22" height="16">
      <rect x="1" y="1" width="8" height="5" fill="#b8ff57" opacity=".5"/>
      <rect x="12" y="1" width="8" height="5" fill="#b8ff57" opacity=".8"/>
      <rect x="1" y="9" width="8" height="5" fill="#b8ff57" opacity=".1"/>
      <rect x="12" y="9" width="8" height="5" fill="#b8ff57" opacity=".6"/>
    </pattern>
    <filter id="g1"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060a12"/>
      <stop offset="100%" stop-color="#0c1420"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="url(#sky)" rx="8"/>
  <rect width="960" height="320" fill="url(#scanlines)" rx="8"/>
  <rect x="1" y="1" width="958" height="318" fill="none" stroke="#131b28" rx="8"/>

  <!-- Terminal corner brackets -->
  <path d="M12,8 L8,8 L8,22" stroke="#b8ff57" stroke-width="1.5" fill="none" opacity=".25"/>
  <path d="M948,8 L952,8 L952,22" stroke="#b8ff57" stroke-width="1.5" fill="none" opacity=".25"/>
  <path d="M12,312 L8,312 L8,298" stroke="#b8ff57" stroke-width="1.5" fill="none" opacity=".25"/>
  <path d="M948,312 L952,312 L952,298" stroke="#b8ff57" stroke-width="1.5" fill="none" opacity=".25"/>

  <!-- ══════ CITY SKYLINE (Left) ══════ -->

  <!-- Stars -->
  <circle cx="50" cy="38" r="1" fill="#b8ff57" opacity=".3"/>
  <circle cx="115" cy="22" r=".8" fill="#b8ff57" opacity=".2"/>
  <circle cx="198" cy="48" r="1.1" fill="#b8ff57" opacity=".15"/>
  <circle cx="275" cy="32" r=".7" fill="#b8ff57" opacity=".25"/>
  <circle cx="350" cy="52" r=".9" fill="#b8ff57" opacity=".2"/>
  <circle cx="88" cy="58" r=".6" fill="#b8ff57" opacity=".35"/>
  <circle cx="310" cy="18" r=".8" fill="#b8ff57" opacity=".15"/>
  <circle cx="170" cy="30" r="1" fill="#b8ff57" opacity=".2"/>

  <!-- Ground -->
  <line x1="18" y1="290" x2="400" y2="290" stroke="#1a2e1e" stroke-width=".6" opacity=".4"/>

  <!-- Building 1 -->
  <rect x="22" y="205" width="30" height="85" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="24" y="207" width="26" height="81" fill="url(#wa)"/>

  <!-- Building 2 -->
  <rect x="57" y="125" width="26" height="165" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="59" y="127" width="22" height="161" fill="url(#wb)"/>

  <!-- Building 3 -->
  <rect x="88" y="248" width="38" height="42" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="90" y="250" width="34" height="38" fill="url(#wc)"/>

  <!-- Building 4 (antenna) -->
  <rect x="131" y="78" width="26" height="212" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="133" y="80" width="22" height="208" fill="url(#wa)"/>
  <line x1="144" y1="78" x2="144" y2="60" stroke="#b8ff57" stroke-width="1" opacity=".35"/>
  <circle cx="144" cy="58" r="2" fill="#b8ff57" opacity=".5">
    <animate attributeName="opacity" values=".5;.1;.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Building 5 -->
  <rect x="162" y="168" width="34" height="122" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="164" y="170" width="30" height="118" fill="url(#wb)"/>

  <!-- Building 6 -->
  <rect x="201" y="232" width="26" height="58" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="203" y="234" width="22" height="54" fill="url(#wc)"/>

  <!-- Building 7 (tallest, antenna) -->
  <rect x="232" y="52" width="30" height="238" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="234" y="54" width="26" height="234" fill="url(#wa)"/>
  <line x1="247" y1="52" x2="247" y2="30" stroke="#b8ff57" stroke-width="1" opacity=".35"/>
  <circle cx="247" cy="28" r="2.5" fill="#b8ff57" opacity=".6">
    <animate attributeName="opacity" values=".6;.1;.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Building 8 -->
  <rect x="267" y="140" width="26" height="150" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="269" y="142" width="22" height="146" fill="url(#wb)"/>

  <!-- Building 9 -->
  <rect x="298" y="255" width="34" height="35" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="300" y="257" width="30" height="31" fill="url(#wc)"/>

  <!-- Building 10 -->
  <rect x="337" y="95" width="26" height="195" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="339" y="97" width="22" height="191" fill="url(#wa)"/>
  <line x1="350" y1="95" x2="350" y2="80" stroke="#b8ff57" stroke-width="1" opacity=".3"/>
  <circle cx="350" cy="78" r="1.5" fill="#b8ff57" opacity=".4">
