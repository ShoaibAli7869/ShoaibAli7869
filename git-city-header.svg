  </circle>

  <!-- Building 11 -->
  <rect x="368" y="188" width="28" height="102" fill="#0c1220" stroke="#14202c" stroke-width=".3"/>
  <rect x="370" y="190" width="24" height="98" fill="url(#wb)"/>

  <!-- ══════ DIVIDER ══════ -->
  <line x1="418" y1="22" x2="418" y2="298" stroke="#151f2c" stroke-width="1" stroke-dasharray="3,6" opacity=".5"/>

  <!-- ══════ PROFILE CARD (Right) ══════ -->

  <!-- Name -->
  <text x="450" y="66" font-family="'Courier New',Courier,monospace" font-size="34" fill="#b8ff57" font-weight="bold" filter="url(#g2)" letter-spacing="3">SHOAIB ALI</text>

  <!-- Handle -->
  <text x="452" y="88" font-family="'Courier New',Courier,monospace" font-size="13" fill="#3a5c3a">@ShoaibAli7869</text>

  <!-- Status tag -->
  <rect x="450" y="100" width="280" height="22" fill="none" stroke="#1a2e1e" stroke-width=".5" rx="3" opacity=".5"/>
  <text x="462" y="115" font-family="'Courier New',Courier,monospace" font-size="10" fill="#b8ff57" opacity=".5" letter-spacing="1.5">&lt; ELITE DEVELOPER // IN THE CITY &gt;</text>

  <!-- Stat 1: Contributions -->
  <rect x="450" y="140" width="185" height="58" fill="#090e16" stroke="#152218" stroke-width=".5" rx="4"/>
  <text x="464" y="157" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3a5c3a" letter-spacing="1.5">CONTRIBUTIONS</text>
  <text x="464" y="186" font-family="'Courier New',Courier,monospace" font-size="26" fill="#b8ff57" font-weight="bold" filter="url(#g1)">500+</text>

  <!-- Stat 2: Repos -->
  <rect x="647" y="140" width="185" height="58" fill="#090e16" stroke="#152218" stroke-width=".5" rx="4"/>
  <text x="661" y="157" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3a5c3a" letter-spacing="1.5">REPOSITORIES</text>
  <text x="661" y="186" font-family="'Courier New',Courier,monospace" font-size="26" fill="#b8ff57" font-weight="bold" filter="url(#g1)">40+</text>

  <!-- Stat 3: Stars -->
  <rect x="450" y="208" width="185" height="58" fill="#090e16" stroke="#152218" stroke-width=".5" rx="4"/>
  <text x="464" y="225" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3a5c3a" letter-spacing="1.5">STARS EARNED</text>
  <text x="464" y="254" font-family="'Courier New',Courier,monospace" font-size="26" fill="#b8ff57" font-weight="bold" filter="url(#g1)">100+</text>

  <!-- Stat 4: Achievements -->
  <rect x="647" y="208" width="185" height="58" fill="#090e16" stroke="#152218" stroke-width=".5" rx="4"/>
  <text x="661" y="225" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3a5c3a" letter-spacing="1.5">ACHIEVEMENTS</text>
  <text x="661" y="254" font-family="'Courier New',Courier,monospace" font-size="26" fill="#b8ff57" font-weight="bold" filter="url(#g1)">15+</text>

  <!-- Footer tagline -->
  <line x1="450" y1="280" x2="832" y2="280" stroke="#141e2c" stroke-width=".5" opacity=".3"/>
  <text x="452" y="298" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3a5c3a" opacity=".65">Full Stack Developer · AI Architect · Digital Craftsman</text>
</svg>
