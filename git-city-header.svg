  <!-- B11 — medium -->
  <rect x="380" y="182" width="30" height="88" fill="#060a16" stroke="#0a1828" stroke-width=".5" rx="1"/>
  <rect x="382" y="184" width="26" height="84" fill="url(#wt1)" rx="1"/>

  <!-- B12 — small accent -->
  <rect x="416" y="244" width="20" height="26" fill="#060a16" stroke="#110e28" stroke-width=".5" rx="1"/>
  <rect x="418" y="246" width="16" height="22" fill="url(#wi)" rx="1"/>

  <!-- ══ VERTICAL DIVIDER ══ -->
  <rect x="446" y="14" width="1" height="272" fill="url(#divl)" rx=".5"/>

  <!-- ══ PROFILE CARD ══ -->

  <!-- Name -->
  <text x="468" y="56" font-family="'Courier New',Courier,monospace" font-size="36" fill="#A855F7" font-weight="bold" filter="url(#gm)" letter-spacing="3">SHOAIB ALI</text>

  <!-- Handle -->
  <text x="470" y="78" font-family="'Courier New',Courier,monospace" font-size="12.5" fill="#6366F1" opacity=".55" letter-spacing=".5">@ShoaibAli7869</text>

  <!-- Status tag -->
  <rect x="468" y="90" width="420" height="22" fill="#060a16" stroke="#A855F7" stroke-width=".35" rx="3" opacity=".2"/>
  <text x="480" y="105" font-family="'Courier New',Courier,monospace" font-size="9" fill="#A855F7" opacity=".4" letter-spacing="1">&lt; FULL STACK DEV // AI ARCHITECT // DIGITAL CRAFTSMAN &gt;</text>

  <!-- ── Stats Grid ── -->

  <!-- S1: Contributions -->
  <rect x="468" y="126" width="200" height="56" fill="#050910" stroke="#1a1040" stroke-width=".5" rx="5"/>
  <text x="484" y="144" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#5a4e7a" letter-spacing="1.5">CONTRIBUTIONS</text>
  <text x="484" y="172" font-family="'Courier New',Courier,monospace" font-size="26" fill="#2DD4BF" font-weight="bold" filter="url(#gs)">500+</text>

  <!-- S2: Repos -->
  <rect x="680" y="126" width="200" height="56" fill="#050910" stroke="#1a1040" stroke-width=".5" rx="5"/>
  <text x="696" y="144" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#5a4e7a" letter-spacing="1.5">REPOSITORIES</text>
  <text x="696" y="172" font-family="'Courier New',Courier,monospace" font-size="26" fill="#2DD4BF" font-weight="bold" filter="url(#gs)">40+</text>

  <!-- S3: Stars -->
  <rect x="468" y="194" width="200" height="56" fill="#050910" stroke="#1a1040" stroke-width=".5" rx="5"/>
  <text x="484" y="212" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#5a4e7a" letter-spacing="1.5">STARS EARNED</text>
  <text x="484" y="240" font-family="'Courier New',Courier,monospace" font-size="26" fill="#2DD4BF" font-weight="bold" filter="url(#gs)">100+</text>

  <!-- S4: Achievements -->
  <rect x="680" y="194" width="200" height="56" fill="#050910" stroke="#1a1040" stroke-width=".5" rx="5"/>
  <text x="696" y="212" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#5a4e7a" letter-spacing="1.5">ACHIEVEMENTS</text>
  <text x="696" y="240" font-family="'Courier New',Courier,monospace" font-size="26" fill="#2DD4BF" font-weight="bold" filter="url(#gs)">15+</text>

  <!-- Footer line -->
