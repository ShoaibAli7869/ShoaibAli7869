<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300">
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="960" height="4">
      <rect width="960" height="1" y="3" fill="#fff" opacity=".012"/>
    </pattern>

    <pattern id="wp1" patternUnits="userSpaceOnUse" width="18" height="12">
      <rect x="1" y="1" width="6" height="4" rx=".5" fill="#A855F7" opacity=".78"/>
      <rect x="10" y="1" width="6" height="4" rx=".5" fill="#A855F7" opacity=".12"/>
      <rect x="1" y="7" width="6" height="4" rx=".5" fill="#A855F7" opacity=".32"/>
      <rect x="10" y="7" width="6" height="4" rx=".5" fill="#A855F7" opacity=".62"/>
    </pattern>
    <pattern id="wp2" patternUnits="userSpaceOnUse" width="18" height="12">
      <rect x="1" y="1" width="6" height="4" rx=".5" fill="#A855F7" opacity=".18"/>
      <rect x="10" y="1" width="6" height="4" rx=".5" fill="#A855F7" opacity=".82"/>
      <rect x="1" y="7" width="6" height="4" rx=".5" fill="#A855F7" opacity=".52"/>
      <rect x="10" y="7" width="6" height="4" rx=".5" fill="#A855F7" opacity=".14"/>
    </pattern>
    <pattern id="wt1" patternUnits="userSpaceOnUse" width="18" height="12">
      <rect x="1" y="1" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".65"/>
      <rect x="10" y="1" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".15"/>
      <rect x="1" y="7" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".4"/>
      <rect x="10" y="7" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".72"/>
    </pattern>
    <pattern id="wt2" patternUnits="userSpaceOnUse" width="18" height="12">
      <rect x="1" y="1" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".14"/>
      <rect x="10" y="1" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".68"/>
      <rect x="1" y="7" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".38"/>
      <rect x="10" y="7" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".8"/>
    </pattern>
    <pattern id="wm" patternUnits="userSpaceOnUse" width="18" height="12">
      <rect x="1" y="1" width="6" height="4" rx=".5" fill="#A855F7" opacity=".45"/>
      <rect x="10" y="1" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".55"/>
      <rect x="1" y="7" width="6" height="4" rx=".5" fill="#2DD4BF" opacity=".22"/>
      <rect x="10" y="7" width="6" height="4" rx=".5" fill="#A855F7" opacity=".38"/>
    </pattern>
    <pattern id="wi" patternUnits="userSpaceOnUse" width="18" height="12">
      <rect x="1" y="1" width="6" height="4" rx=".5" fill="#6366F1" opacity=".55"/>
      <rect x="10" y="1" width="6" height="4" rx=".5" fill="#6366F1" opacity=".2"/>
      <rect x="1" y="7" width="6" height="4" rx=".5" fill="#6366F1" opacity=".35"/>
      <rect x="10" y="7" width="6" height="4" rx=".5" fill="#6366F1" opacity=".65"/>
    </pattern>

    <filter id="gs"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gm"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gl"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030612"/>
      <stop offset="40%" stop-color="#070b18"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="gnd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A855F7" stop-opacity=".03"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity=".03"/>
    </linearGradient>
    <linearGradient id="refl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A855F7" stop-opacity=".04"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A855F7" stop-opacity=".08"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity=".08"/>
    </linearGradient>
  </defs>

  <!-- ══ BACKGROUND ══ -->
  <rect width="960" height="300" fill="url(#sky)" rx="8"/>
  <rect width="960" height="300" fill="url(#scan)" rx="8"/>
  <rect x=".5" y=".5" width="959" height="299" fill="none" stroke="#A855F7" stroke-width=".3" rx="8" opacity=".08"/>

  <!-- ══ CORNER BRACKETS ══ -->
  <path d="M16,6 L6,6 L6,24" stroke="#A855F7" stroke-width="1.8" fill="none" opacity=".2"/>
  <path d="M944,6 L954,6 L954,24" stroke="#2DD4BF" stroke-width="1.8" fill="none" opacity=".2"/>
  <path d="M16,294 L6,294 L6,276" stroke="#2DD4BF" stroke-width="1.8" fill="none" opacity=".2"/>
  <path d="M944,294 L954,294 L954,276" stroke="#A855F7" stroke-width="1.8" fill="none" opacity=".2"/>

  <!-- ══ STARS ══ -->
  <circle cx="38" cy="24" r="1" fill="#A855F7" opacity=".22"><animate attributeName="opacity" values=".22;.08;.22" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="98" cy="14" r=".7" fill="#2DD4BF" opacity=".18"/>
  <circle cx="172" cy="36" r="1.1" fill="#6366F1" opacity=".12"/>
  <circle cx="245" cy="18" r=".8" fill="#A855F7" opacity=".16"><animate attributeName="opacity" values=".16;.04;.16" dur="5.5s" repeatCount="indefinite"/></circle>
  <circle cx="320" cy="40" r=".9" fill="#2DD4BF" opacity=".14"/>
  <circle cx="72" cy="46" r=".6" fill="#A855F7" opacity=".2"/>
  <circle cx="290" cy="10" r=".7" fill="#6366F1" opacity=".1"/>
  <circle cx="148" cy="20" r=".9" fill="#2DD4BF" opacity=".15"><animate attributeName="opacity" values=".15;.05;.15" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="370" cy="28" r=".5" fill="#A855F7" opacity=".18"/>
  <circle cx="210" cy="8" r=".6" fill="#2DD4BF" opacity=".12"/>
  <circle cx="55" cy="56" r=".4" fill="#6366F1" opacity=".15"/>
  <circle cx="395" cy="48" r=".7" fill="#A855F7" opacity=".1"/>

  <!-- ══ GROUND ══ -->
  <rect x="14" y="270" width="410" height="22" fill="url(#gnd)"/>
  <rect x="14" y="272" width="410" height="16" fill="url(#refl)"/>
  <line x1="16" y1="270" x2="420" y2="270" stroke="#A855F7" stroke-width=".35" opacity=".12"/>

  <!-- ══ CITY SKYLINE ══ -->

  <!-- B1 — medium -->
  <rect x="22" y="202" width="30" height="68" fill="#060a16" stroke="#110e28" stroke-width=".5" rx="1"/>
  <rect x="24" y="204" width="26" height="64" fill="url(#wp1)" rx="1"/>

  <!-- B2 — tall -->
  <rect x="58" y="122" width="28" height="148" fill="#060a16" stroke="#0a1828" stroke-width=".5" rx="1"/>
