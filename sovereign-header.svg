<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#04060c"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B7340"/>
      <stop offset="30%" stop-color="#C9A96E"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#8B7340"/>
    </linearGradient>
    <linearGradient id="statbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1020"/>
      <stop offset="100%" stop-color="#080c16"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity=".025"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip"><rect width="1000" height="360" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1000" height="360" fill="url(#bg)"/>
    <rect width="1000" height="360" fill="url(#aura)"/>

    <!-- ═══ CONSTELLATION LINES ═══ -->
    <line x1="80" y1="45" x2="180" y2="85" stroke="#C9A96E" stroke-width=".2" opacity=".06"/>
    <line x1="80" y1="45" x2="130" y2="135" stroke="#8B0000" stroke-width=".2" opacity=".05"/>
    <line x1="180" y1="85" x2="200" y2="30" stroke="#C9A96E" stroke-width=".2" opacity=".05"/>
    <line x1="180" y1="85" x2="310" y2="65" stroke="#8B0000" stroke-width=".2" opacity=".06"/>
    <line x1="200" y1="30" x2="310" y2="65" stroke="#C9A96E" stroke-width=".15" opacity=".04"/>
    <line x1="310" y1="65" x2="280" y2="145" stroke="#8B0000" stroke-width=".2" opacity=".05"/>
    <line x1="130" y1="135" x2="280" y2="145" stroke="#5C0000" stroke-width=".15" opacity=".03"/>
    <line x1="400" y1="28" x2="310" y2="65" stroke="#C9A96E" stroke-width=".15" opacity=".04"/>
    <line x1="600" y1="32" x2="720" y2="48" stroke="#C9A96E" stroke-width=".2" opacity=".05"/>
    <line x1="720" y1="48" x2="810" y2="90" stroke="#8B0000" stroke-width=".2" opacity=".06"/>
    <line x1="720" y1="48" x2="755" y2="125" stroke="#C9A96E" stroke-width=".15" opacity=".04"/>
    <line x1="810" y1="90" x2="875" y2="38" stroke="#C9A96E" stroke-width=".2" opacity=".05"/>
    <line x1="810" y1="90" x2="895" y2="155" stroke="#8B0000" stroke-width=".2" opacity=".05"/>
    <line x1="875" y1="38" x2="895" y2="155" stroke="#5C0000" stroke-width=".15" opacity=".03"/>
    <line x1="60" y1="275" x2="150" y2="305" stroke="#8B0000" stroke-width=".15" opacity=".04"/>
    <line x1="845" y1="285" x2="925" y2="315" stroke="#8B0000" stroke-width=".15" opacity=".04"/>

    <!-- ═══ CONSTELLATION STARS ═══ -->
    <!-- Left cluster -->
    <circle cx="80" cy="45" r="1.2" fill="#C9A96E" opacity=".2">
      <animate attributeName="opacity" values=".2;.5;.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="85" r="1" fill="#C9A96E" opacity=".18"/>
    <circle cx="130" cy="135" r=".8" fill="#8B0000" opacity=".15">
      <animate attributeName="opacity" values=".15;.4;.15" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="30" r=".7" fill="#C9A96E" opacity=".22"/>
    <circle cx="310" cy="65" r="1.1" fill="#8B0000" opacity=".16">
      <animate attributeName="opacity" values=".16;.4;.16" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="145" r=".6" fill="#5C0000" opacity=".12"/>
    <circle cx="400" cy="28" r=".8" fill="#C9A96E" opacity=".14"/>

    <!-- Right cluster -->
    <circle cx="600" cy="32" r=".7" fill="#C9A96E" opacity=".16"/>
    <circle cx="720" cy="48" r="1.2" fill="#C9A96E" opacity=".2">
      <animate attributeName="opacity" values=".2;.5;.2" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="810" cy="90" r="1" fill="#8B0000" opacity=".18"/>
    <circle cx="875" cy="38" r=".9" fill="#C9A96E" opacity=".2">
      <animate attributeName="opacity" values=".2;.45;.2" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="755" cy="125" r=".6" fill="#5C0000" opacity=".12"/>
    <circle cx="895" cy="155" r=".8" fill="#8B0000" opacity=".14">
      <animate attributeName="opacity" values=".14;.35;.14" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- Bottom scattered -->
    <circle cx="60" cy="275" r=".7" fill="#8B0000" opacity=".1"/>
    <circle cx="150" cy="305" r=".5" fill="#5C0000" opacity=".08"/>
    <circle cx="845" cy="285" r=".6" fill="#8B0000" opacity=".1"/>
    <circle cx="925" cy="315" r=".5" fill="#5C0000" opacity=".08"/>
    <circle cx="50" cy="190" r=".4" fill="#C9A96E" opacity=".08"/>
    <circle cx="950" cy="210" r=".4" fill="#C9A96E" opacity=".08"/>
    <circle cx="470" cy="20" r=".5" fill="#5C0000" opacity=".06"/>
    <circle cx="530" cy="340" r=".4" fill="#5C0000" opacity=".06"/>

    <!-- ═══ BORDER ═══ -->
    <rect x="1" y="1" width="998" height="358" rx="12" fill="none" stroke="#8B0000" stroke-width=".12" opacity=".25"/>

    <!-- ═══ NAME & ROLE ═══ -->
    <text x="500" y="125" font-family="'Courier New',Courier,monospace" font-size="44" fill="url(#gold)" font-weight="bold" text-anchor="middle" filter="url(#g1)" letter-spacing="8">SHOAIB ALI</text>
    <text x="500" y="155" font-family="'Courier New',Courier,monospace" font-size="11" fill="#5C0000" text-anchor="middle" letter-spacing="3" opacity=".45">FULL STACK ARCHITECT  ·  AI ENGINEER  ·  SYSTEM DESIGNER</text>

    <!-- ═══ MINIMAL DIVIDER ═══ -->
    <circle cx="460" cy="178" r=".8" fill="#C9A96E" opacity=".12"/>
    <circle cx="480" cy="178" r="1" fill="#C9A96E" opacity=".18"/>
    <circle cx="500" cy="178" r="1.2" fill="#C9A96E" opacity=".25"/>
    <circle cx="520" cy="178" r="1" fill="#C9A96E" opacity=".18"/>
    <circle cx="540" cy="178" r=".8" fill="#C9A96E" opacity=".12"/>

    <!-- ═══ STATS ═══ -->
    <rect x="150" y="205" width="155" height="52" fill="url(#statbg)" stroke="#8B0000" stroke-width=".18" rx="5" opacity=".7"/>
    <rect x="150" y="205" width="2" height="52" fill="#8B0000" rx="1" opacity=".3"/>
    <text x="164" y="222" font-family="'Courier New',monospace" font-size="7" fill="#5C0000" letter-spacing="2" opacity=".45">CONTRIBUTIONS</text>
    <text x="164" y="248" font-family="'Courier New',monospace" font-size="26" fill="#8B0000" font-weight="bold" filter="url(#g1)">500+</text>

    <rect x="325" y="205" width="155" height="52" fill="url(#statbg)" stroke="#C9A96E" stroke-width=".18" rx="5" opacity=".7"/>
    <rect x="325" y="205" width="2" height="52" fill="#C9A96E" rx="1" opacity=".3"/>
    <text x="339" y="222" font-family="'Courier New',monospace" font-size="7" fill="#5C0000" letter-spacing="2" opacity=".45">REPOSITORIES</text>
    <text x="339" y="248" font-family="'Courier New',monospace" font-size="26" fill="#C9A96E" font-weight="bold" filter="url(#g1)">40+</text>

    <rect x="520" y="205" width="155" height="52" fill="url(#statbg)" stroke="#C9A96E" stroke-width=".18" rx="5" opacity=".7"/>
    <rect x="520" y="205" width="2" height="52" fill="#C9A96E" rx="1" opacity=".3"/>
    <text x="534" y="222" font-family="'Courier New',monospace" font-size="7" fill="#5C0000" letter-spacing="2" opacity=".45">STARS EARNED</text>
    <text x="534" y="248" font-family="'Courier New',monospace" font-size="26" fill="#C9A96E" font-weight="bold" filter="url(#g1)">100+</text>

    <rect x="695" y="205" width="155" height="52" fill="url(#statbg)" stroke="#8B0000" stroke-width=".18" rx="5" opacity=".7"/>
    <rect x="695" y="205" width="2" height="52" fill="#8B0000" rx="1" opacity=".3"/>
    <text x="709" y="222" font-family="'Courier New',monospace" font-size="7" fill="#5C0000" letter-spacing="2" opacity=".45">ACHIEVEMENTS</text>
    <text x="709" y="248" font-family="'Courier New',monospace" font-size="26" fill="#8B0000" font-weight="bold" filter="url(#g1)">15+</text>

    <!-- ═══ FOOTER ═══ -->
    <text x="500" y="300" font-family="Georgia,serif" font-size="9.5" fill="#5C0000" text-anchor="middle" opacity=".22" letter-spacing="1">Pakistan → Global · Where vision meets engineering excellence</text>
    <text x="500" y="340" font-family="'Courier New',monospace" font-size="9" fill="#C9A96E" text-anchor="middle" opacity=".18" letter-spacing="1.5">gh://ShoaibAli7869</text>
  </g>
</svg>
